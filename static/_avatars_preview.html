<!doctype html>
<meta charset="utf-8">
<title>头像审阅</title>
<style>
  body { background: #f6efe1; font-family: system-ui; padding: 40px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; max-width: 900px; }
  .card { border: 2px solid #1c1310; padding: 12px; background: #fff9ec; text-align: center; }
  .card img { width: 128px; height: 128px; image-rendering: pixelated; display: block; margin: 0 auto 8px; }
  .name { font-weight: bold; font-size: 18px; }
  .role { color: #6d6053; font-size: 13px; }
</style>
<div class="grid">
  <div class="card"><img src="/static/avatars/Pine.svg"><div class="name">Pine</div><div class="role">产品经理</div></div>
  <div class="card"><img src="/static/avatars/Ash.svg"><div class="name">Ash</div><div class="role">开发</div></div>
  <div class="card"><img src="/static/avatars/Wren.svg"><div class="name">Wren</div><div class="role">设计师</div></div>
  <div class="card"><img src="/static/avatars/Owl.svg"><div class="name">Owl</div><div class="role">测试</div></div>
  <div class="card"><img src="/static/avatars/Chief.svg"><div class="name">Chief</div><div class="role">老板</div></div>
  <div class="card"><img src="/static/avatars/Rune.svg"><div class="name">Rune</div><div class="role">数据分析</div></div>
  <div class="card"><img src="/static/avatars/Poppy.svg"><div class="name">Poppy</div><div class="role">客服</div></div>
  <div class="card"><img src="/static/avatars/Judge.svg"><div class="name">Judge</div><div class="role">法务</div></div>
  <div class="card"><img src="/static/avatars/Rally.svg"><div class="name">Rally</div><div class="role">运营</div></div>
  <div class="card"><img src="/static/avatars/Ivy.svg"><div class="name">Ivy</div><div class="role">HR</div></div>
  <div class="card"><img src="/static/avatars/Ledger.svg"><div class="name">Ledger</div><div class="role">财务</div></div>
  <div class="card"><img src="/static/avatars/Foreman.svg"><div class="name">Foreman</div><div class="role">任务调度</div></div>
</div>
